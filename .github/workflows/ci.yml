name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Ubuntu LLVM 21
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            clang-21 \
            llvm-21-dev \
            libclang-21-dev \
            libclang-cpp21-dev \
            nlohmann-json3-dev \
            libgtest-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-21 \
            -DCMAKE_CXX_COMPILER=clang++-21 \
            -DLLVM_DIR=/usr/lib/llvm-21/lib/cmake/llvm \
            -DClang_DIR=/usr/lib/llvm-21/lib/cmake/clang \
            -DCUDAMEMTRACE_CORE_BUILD_TESTS=ON \
            -DCUDAMEMTRACE_CORE_BUILD_EXAMPLES=ON \
            -DCUDAMEMTRACE_CORE_BUILD_DOCS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
